models:
  relevance_filter:
    provider: "openrouter"
    model_id: "ts-pri-kimi-26-fast"
    temperature: 0.1
    batch_size: 10

  deep_analysis:
    provider: "openrouter"
    model_id: "ts-pri-kimi-26"
    temperature: 0.2
    batch_size: 1

research_focus:
  description: |
    Our current research focus is on World Models assisting Embodied AI
    downstream tasks (manipulation, locomotion, planning). Specifically:
    - World model-based policy learning / planning for robot control
    - VLA (Vision-Language-Action) models and architectures
    - World models for physical understanding and sim-to-real
    - Diffusion policies / action generation with world model priors
    Papers about pure navigation, traffic signs, weather classification,
    or autonomous driving perception without world model / VLA components
    are NOT aligned with our focus.
  high_keywords:
    - "world model"
    - "VLA"
    - "vision-language-action"
    - "action generation"
    - "diffusion policy"
    - "robot policy"
    - "manipulation"
    - "locomotion"
    - "sim-to-real"
    - "model-based reinforcement learning"
    - "latent dynamics"
    - "JEPA"
  low_keywords:
    - "navigation"
    - "traffic sign"
    - "weather classification"
    - "V2X"
    - "lane detection"
    - "object detection"
    - "pedestrian"

scoring:
  weights:
    novelty: 0.20
    impact: 0.25
    reproducibility: 0.10
    affiliation: 0.10
    direction_match: 0.10
    focus_relevance: 0.25
  hot_threshold: 4.0

email:
  smtp_server: "smtp.qq.com"
  smtp_port: 465
  use_ssl: true
  max_highlights_in_email: 3

concurrency:
  max_concurrent_llm: 10
  max_concurrent_pdf: 5

pdf:
  download_enabled: true
  storage_dir: "data/pdfs"
  engine: "native"  # native | pdf-text | mistral-ocr (auto-selected by file size)

hjfy:
  enabled: false
  base_url: "https://hjfy.top"
  link_template: "https://hjfy.top/arxiv/{arxiv_id}"
  download_pdfs: false
