name: Daily Papers Agent

on:
  schedule:
    - cron: '30 5 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Prepare git state
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "arxiv-agent[bot]"
          git config user.email "bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin main
          git checkout -B main origin/main

          git -C data config user.name "arxiv-agent[bot]"
          git -C data config user.email "bot@users.noreply.github.com"
          git -C data remote set-url origin "https://x-access-token:${PAT_TOKEN}@github.com/zianzhao68/arxiv-daily-data.git"
          git -C data fetch origin main
          git -C data checkout -B main origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          QQ_MAIL_AUTH_CODE: ${{ secrets.QQ_MAIL_AUTH_CODE }}
          QQ_MAIL_ADDRESS: ${{ secrets.QQ_MAIL_ADDRESS }}
          SKIP_GIT_PUSH: "1"
        run: python -m src.main

      - name: Commit and push data submodule
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "arxiv-agent[bot]"
          git config user.email "bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git"
          git -C data remote set-url origin "https://x-access-token:${PAT_TOKEN}@github.com/zianzhao68/arxiv-daily-data.git"

          git -C data add -A
          if ! git -C data diff --cached --quiet; then
            git -C data commit -m "daily update: $(date -u +%Y-%m-%d)"
            git -C data pull --rebase origin main
            git -C data push origin HEAD:main
          fi

          git add data
          if ! git diff --cached --quiet; then
            git commit -m "update data submodule pointer"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
