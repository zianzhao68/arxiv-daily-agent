name: Daily Papers Agent

on:
  schedule:
    - cron: '30 5 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          QQ_MAIL_AUTH_CODE: ${{ secrets.QQ_MAIL_AUTH_CODE }}
          QQ_MAIL_ADDRESS: ${{ secrets.QQ_MAIL_ADDRESS }}
        run: python -m src.main

      - name: Commit and push data submodule
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          cd data
          git remote set-url origin "https://x-access-token:${PAT_TOKEN}@github.com/Yuuuuuuuuhvt/embodied-daily-papers.git"
          git checkout main
          git config user.name "arxiv-agent[bot]"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "daily update: $(date -u +%Y-%m-%d)"
          git push
          cd ..
          git config user.name "arxiv-agent[bot]"
          git config user.email "bot@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "update data submodule pointer"
          git push
